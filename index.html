<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANEW 備品発注</title>
<style>
  :root{ --green:#2faa56; --green-dark:#1f8a44; --green-light:#e7f6ec; --ink:#1f2d28; --muted:#7c8a83; --line:#dde4df; --bg:#f6f8f7; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;padding-bottom:60px;}
  header{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:rgba(255,255,255,.97);backdrop-filter:blur(8px);z-index:20;}
  .brand{font-size:18px;font-weight:900;color:var(--green-dark);letter-spacing:.5px;}
  .brand .sub{font-size:12px;font-weight:700;color:var(--muted);margin-left:8px;}
  .who{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--green-dark);background:var(--green-light);border:1.5px solid #cfe9d8;border-radius:999px;padding:6px 13px;}
  .backbtn{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:800;color:var(--green-dark);background:#fff;border:1.5px solid #cfe9d8;border-radius:999px;padding:7px 14px;text-decoration:none;cursor:pointer;}
  .backbtn:hover{background:var(--green-light);}
  .brand-logo{display:flex;align-items:center;gap:11px;}
  .brand-divider{width:1px;height:22px;background:#e5e7eb;display:inline-block;}
  .brand-sub{font-size:12.5px;font-weight:800;color:var(--ink);}
  .wrap{max-width:980px;margin:0 auto;padding:16px 16px 0;}
  .seclabel{font-size:11.5px;font-weight:800;color:var(--muted);margin:0 2px 6px;}
  .tabs{display:flex;gap:8px;margin-bottom:16px;}
  .tab{flex:1;padding:11px;border:1.5px solid var(--line);background:#fff;border-radius:12px;font-size:14px;font-weight:800;color:var(--muted);cursor:pointer;font-family:inherit;}
  .tab.active{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 3px 10px rgba(47,170,86,.22);}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 1px 2px rgba(16,24,40,.04);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:640px){.grid{grid-template-columns:1fr;}}
  label{display:block;font-size:12px;font-weight:800;color:#46554d;margin:0 0 5px;}
  .req{color:#d6453f;}
  input,textarea,select{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink);}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--green);}
  input[readonly]{background:#f1f5f2;color:#5d6b63;}
  textarea{resize:vertical;min-height:64px;}
  .full{grid-column:1 / -1;}
  .btn{border:none;background:var(--green);color:#fff;font-size:15px;font-weight:800;padding:13px 20px;border-radius:12px;cursor:pointer;font-family:inherit;transition:.15s;}
  .btn:hover{background:var(--green-dark);}
  .btn:disabled{opacity:.5;cursor:default;}
  .btn.ghost{background:#fff;color:var(--green);border:1.5px solid var(--green);}
  .btn.gray{background:#fff;color:var(--muted);border:1.5px solid var(--line);}
  .actions{display:flex;gap:10px;margin-top:16px;}
  .badge{display:inline-block;font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;}
  .b-req{background:#FFF4E5;color:#C2410C;} .b-ord{background:#E0F2FE;color:#0369A1;} .b-arr{background:#EAF8F0;color:#15803D;}
  .row-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
  .row-title{font-size:16px;font-weight:800;}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:12.5px;color:#46554d;}
  .kv b{color:var(--muted);font-weight:700;}
  .empty{text-align:center;color:var(--muted);padding:40px 0;font-size:14px;}
  .notice{font-size:12px;color:#92702a;background:#fdf6e3;border:1px solid #efe0b0;border-radius:10px;padding:9px 12px;margin-bottom:12px;}
  .aibox{border:1.5px solid #cfe3f7;background:#f5faff;border-radius:16px;padding:16px;margin-bottom:14px;}
  .aibox .row{display:flex;gap:8px;}
  .aihint{font-size:11.5px;color:#6b7a86;margin-top:7px;}
  .search{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:14px;font-family:inherit;margin-bottom:12px;}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#1f2d28;color:#fff;font-size:13px;font-weight:700;padding:11px 20px;border-radius:999px;opacity:0;transition:.25s;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .overlay{position:fixed;inset:0;background:rgba(20,30,26,.45);display:none;align-items:center;justify-content:center;z-index:40;padding:18px;}
  .overlay.show{display:flex;}
  .modal{background:#fff;border-radius:18px;padding:22px;max-width:560px;width:100%;max-height:88vh;overflow:auto;}
  .modal h3{font-size:17px;font-weight:800;margin-bottom:14px;}
</style>
</head>
<body>
<header>
  <a class="backbtn" href="https://hub.anewinc.co.jp/">← ANEWアプリに戻る</a>
  <div class="brand-logo">
    <svg width="100" height="29" viewBox="0 0 200 58" aria-hidden="true" style="display:block">
      <path d="M30 4 L56 52 L4 52 Z" fill="none" stroke="#16A34A" stroke-width="4" stroke-linejoin="round"/>
      <path d="M34 26 L46 48 L22 48 Z" fill="none" stroke="#16A34A" stroke-width="3.5" stroke-linejoin="round"/>
      <g fill="none" stroke="#1A1A1A" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M84 50 L84 24 M84 30 C84 26 88 23 93 23 C98 23 101 27 101 32 L101 50"/>
        <path d="M112 38 L129 38 C129 29 124 23 120 23 C114 23 110 29 110 37 C110 45 114 51 121 51 C125 51 128 49 130 46"/>
        <path d="M140 24 L146 50 L153 30 L160 50 L166 24"/>
      </g>
    </svg>
    <span class="brand-divider"></span>
    <span class="brand-sub">備品発注</span>
  </div>
  <div class="who" id="who">👤 ゲスト</div>
</header>

<div class="wrap">
  <!-- 口座（振込元）区分：全タブ共通 -->
  <div class="seclabel">振込元（口座）区分 ― 経理はここで区別します</div>
  <div style="margin-bottom:14px;max-width:260px;">
    <select id="destSel" onchange="setDest(this.value)" style="font-weight:800;font-size:15px;padding:12px 14px;border-width:2px;">
      <option value="anew">ANEW</option>
      <option value="gf">GF（古着）</option>
      <option value="frontier">フロンティア</option>
    </select>
  </div>

  <!-- メインタブ：依頼／状況／到着済み -->
  <div class="tabs">
    <button class="tab active" id="tabReq" onclick="showTab('req')">発注を依頼する</button>
    <button class="tab" id="tabList" onclick="showTab('list')">発注状況</button>
    <button class="tab" id="tabArrived" onclick="showTab('arrived')">到着済み</button>
  </div>

  <!-- 依頼フォーム -->
  <div id="paneReq">
    <div class="card">
      <div class="grid">
        <div><label>依頼日</label><input id="f_reqdate" readonly></div>
        <div><label>依頼者</label><input id="f_requester" readonly></div>
        <div class="full"><label>品目 <span class="req">*</span></label><input id="f_item" placeholder="例：宅配袋 A4サイズ"></div>
        <div><label>品番 / JAN</label><input id="f_code" placeholder="例：4901234567890"></div>
        <div><label>サイズ</label><input id="f_size" placeholder="例：A4 / L"></div>
        <div><label>カラー</label><input id="f_color" placeholder="例：クラフト"></div>
        <div><label>発注ロット（1ロットの入数）</label><input id="f_lot" type="number" min="0" placeholder="例：100"></div>
        <div><label>1ロット金額（円）</label><input id="f_lotprice" type="number" min="0" placeholder="例：1200"></div>
        <div><label>希望ロット数</label><input id="f_lotqty" type="number" min="0" placeholder="例：3"></div>
        <div><label>参考URL</label><input id="f_url" placeholder="https://..."></div>
        <div class="full"><label>備考</label><textarea id="f_note" placeholder="補足があれば入力"></textarea></div>
      </div>
      <div class="actions">
        <button class="btn" id="submitBtn" onclick="submitReq()">この内容で依頼する</button>
        <button class="btn gray" onclick="clearForm()">クリア</button>
      </div>
    </div>
  </div>

  <!-- 発注状況（到着済み以外） -->
  <div id="paneList" style="display:none">
    <div class="notice" id="srvNotice" style="display:none"></div>
    <div id="listBox"></div>
  </div>

  <!-- 到着済み（過去ログ＋検索＋コピー） -->
  <div id="paneArrived" style="display:none">
    <input class="search" id="arrSearch" placeholder="🔍 キーワード検索（品目・品番・発注先・依頼者など）" oninput="renderArrived()">
    <div id="arrivedBox"></div>
  </div>
</div>

<!-- 発注処理モーダル（発注者が記入。保存するとシートがグレーアウト） -->
<div class="overlay" id="ov">
  <div class="modal">
    <h3>発注処理（発注者が記入）</h3>
    <div class="grid">
      <div class="full"><label>発注先</label><input id="m_vendor" placeholder="例：アスクル"></div>
      <div><label>発注金額（円）</label><input id="m_amount" type="number" min="0"></div>
      <div><label>発注日</label><input id="m_orderdate" type="date"></div>
      <div class="full"><label>発注者</label><input id="m_orderer"></div>
    </div>
    <div class="actions">
      <button class="btn" id="m_save" onclick="saveOrder()">発注完了として保存</button>
      <button class="btn gray" onclick="closeModal()">キャンセル</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- バージョンバッジ（右下・タップで更新履歴） -->
<div id="appVerBadge" onclick="alert('備品発注 更新履歴\n\nv1.1（2026/6/14）\n・口座区分（ANEW／GF／フロンティア）を横ボタンからプルダウン選択に変更\n・発注状況に「並び替え（状態順／新しい順／古い順）」を追加\n・状態でボタンの色を区別（発注処理＝オレンジ／受け取り＝ブルー）\n・依頼のままでも「受け取りました（到着済へ）」で移動できるように\n・到着済みに「受取者」を表示\n\nv1.0\n・備品発注の公開（依頼／発注状況／到着済み）')" style="position:fixed;right:10px;bottom:10px;z-index:60;background:rgba(31,45,40,.82);color:#fff;font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;cursor:pointer;font-family:inherit;user-select:none;">v1.1</div>

<script>
/* ====== 設定 ====== */
const GAS_URL = "https://script.google.com/macros/s/AKfycbwZ_5IRh5GKeZo46qj380--VwU9Gco5dPC4u03Aos_bB6ALOrJNzgxT6_Ne4M6ioubGYw/exec";

/* ログイン情報（ANEWアプリから ?name=&uid= で渡される） */
const params = new URLSearchParams(location.search);
const ME_NAME = params.get('name') || '';
const ME_UID  = params.get('uid') || '';

function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function genId(){return 'po_'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36);}

document.getElementById('who').textContent = '👤 ' + (ME_NAME || 'ゲスト');
document.getElementById('f_reqdate').value = todayStr();
document.getElementById('f_requester').value = ME_NAME || '（アプリから開くと自動入力）';

let rows = [];   // 現在の口座区分の発注データ
let editId = null;
let dest = 'anew';   // anew=ANEW / gf=GF（古着）/ frontier=フロンティア
const DESTNAME = { anew:'ANEW', gf:'GF（古着）', frontier:'フロンティア' };
const DESTCOLOR = { anew:'#16A34A', gf:'#1E3A8A', frontier:'#EA580C' };
const DESTBTN = { anew:'destAnew', gf:'destGf', frontier:'destFr' };

function setDest(d){
  dest = d;
  const sel=document.getElementById('destSel');
  if(sel){ if(sel.value!==d) sel.value=d; sel.style.borderColor=DESTCOLOR[d]; sel.style.color=DESTCOLOR[d]; sel.style.boxShadow='0 0 0 2px '+DESTCOLOR[d]+'22'; }
  const lv=document.getElementById('paneList').style.display!=='none';
  const av=document.getElementById('paneArrived').style.display!=='none';
  if(lv||av) refresh();
}
setDest('anew');
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function showTab(t){
  document.getElementById('tabReq').classList.toggle('active', t==='req');
  document.getElementById('tabList').classList.toggle('active', t==='list');
  document.getElementById('tabArrived').classList.toggle('active', t==='arrived');
  document.getElementById('paneReq').style.display     = t==='req'?'':'none';
  document.getElementById('paneList').style.display    = t==='list'?'':'none';
  document.getElementById('paneArrived').style.display = t==='arrived'?'':'none';
  if(t==='list' || t==='arrived') refresh();
}

/* ===== GAS通信（読み：GET / 書き：POST） ===== */
async function apiLoad(){
  if(!GAS_URL) return [];
  try{ const r=await fetch(GAS_URL+'?dest='+dest+'&t='+Date.now()); const d=await r.json(); return Array.isArray(d.rows)?d.rows:[]; }catch(e){ return []; }
}
async function apiPost(body){
  if(!GAS_URL) return;
  try{ await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)}); }catch(e){}
}

function clearForm(){
  ['f_item','f_code','f_size','f_color','f_lot','f_lotprice','f_lotqty','f_url','f_note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f_reqdate').value = todayStr();
}

async function submitReq(){
  const item=document.getElementById('f_item').value.trim();
  if(!item){ toast('品目を入力してください'); return; }
  if(!ME_NAME){ if(!confirm('依頼者が未設定です。ゲストとして依頼しますか？\n（ANEWアプリから開くと自動で名前が入ります）')) return; }
  const btn=document.getElementById('submitBtn'); btn.disabled=true;
  const body={
    action:'create', dest:dest, id:genId(),
    reqdate:document.getElementById('f_reqdate').value,
    item:item,
    code:document.getElementById('f_code').value.trim(),
    size:document.getElementById('f_size').value.trim(),
    color:document.getElementById('f_color').value.trim(),
    lot:document.getElementById('f_lot').value,
    lotprice:document.getElementById('f_lotprice').value,
    lotqty:document.getElementById('f_lotqty').value,
    requester:ME_NAME||'ゲスト',
    note:document.getElementById('f_note').value.trim(),
    url:document.getElementById('f_url').value.trim()
  };
  await apiPost(body);
  btn.disabled=false; clearForm(); toast('「'+DESTNAME[dest]+'」に発注を依頼しました！');
  await sleep(800); showTab('list');
}

function n(v){ return (v===''||v==null)?0:Number(v)||0; }
function estAmount(r){ const a=n(r.lotprice)*n(r.lotqty); return a?('概算 '+a.toLocaleString()+'円'):''; }
function badge(s){ if(s==='到着済')return '<span class="badge b-arr">到着済 ✓</span>'; if(s==='発注済')return '<span class="badge b-ord">発注済（到着待ち）</span>'; return '<span class="badge b-req">依頼（未発注）</span>'; }

/* 読み込み → 発注状況＋到着済みを両方描画 */
async function refresh(){
  const lb=document.getElementById('listBox'); if(lb) lb.innerHTML='<div class="empty">読み込み中…</div>';
  rows = await apiLoad();
  renderList(); renderArrived();
}

/* 発注状況：到着済み以外（依頼／発注済）。状態などで並び替え可能 */
let listSort = 'status'; // status=状態順 / new=新しい順 / old=古い順
function setListSort(v){ listSort = v; renderList(); }
function statusRank(s){ return s==='発注済' ? 0 : s==='依頼' ? 1 : 2; } // 到着待ち（発注済）を上に
function renderList(){
  const note = document.getElementById('srvNotice'); note.style.display='';
  note.textContent = '「'+DESTNAME[dest]+'」の発注状況です。依頼 → 発注処理 → 受取通知 の順に進みます。受取通知をすると「到着済み」タブへ移動します。';
  const box=document.getElementById('listBox');
  let list = rows.filter(r=> r.status!=='到着済');
  if(!list.length){ box.innerHTML='<div class="empty">進行中の発注はありません。</div>'; return; }
  list = list.slice().sort((a,b)=>{
    if(listSort==='status'){ const d=statusRank(a.status)-statusRank(b.status); if(d) return d; return String(b.reqdate||'').localeCompare(String(a.reqdate||'')); }
    if(listSort==='old') return String(a.reqdate||'').localeCompare(String(b.reqdate||''));
    return String(b.reqdate||'').localeCompare(String(a.reqdate||''));
  });
  const sortUi = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12.5px;font-weight:800;color:#46554d">並び替え：
    <select onchange="setListSort(this.value)" style="width:auto;padding:8px 11px;font-weight:800">
      <option value="status"${listSort==='status'?' selected':''}>状態順（到着待ち→依頼）</option>
      <option value="new"${listSort==='new'?' selected':''}>新しい順</option>
      <option value="old"${listSort==='old'?' selected':''}>古い順</option>
    </select></div>`;
  box.innerHTML = sortUi + list.map(r=>{
    const canOrder = r.id && r.status==='依頼';
    const canReceive = r.id && (r.status==='発注済' || r.status==='依頼'); // 依頼のままでも到着済へ動かせるように
    let act='';
    if(canOrder) act+=`<button class="btn" style="background:#EA580C" onclick="openOrder('${esc(r.id)}')">発注処理</button>`;
    if(canReceive) act+=`<button class="btn" style="background:#0369A1" onclick="receive('${esc(r.id)}')">受け取りました（到着済へ）</button>`;
    const dim = (r.status==='発注済');
    return `
    <div class="card"${dim?' style="background:#f3f5f4"':''}>
      <div class="row-head">${badge(r.status)}<div class="row-title">${esc(r.item)}</div><div style="margin-left:auto;font-size:12px;color:#7c8a83">${esc(fmtDate(r.reqdate))}</div></div>
      <div class="kv">
        <b>依頼者</b><span>${esc(r.requester||'')}</span>
        <b>品番/JAN</b><span>${esc(r.code||'-')}</span>
        <b>サイズ/カラー</b><span>${esc(r.size||'-')} / ${esc(r.color||'-')}</span>
        <b>ロット</b><span>${esc(r.lot||'-')}入 × 希望${esc(r.lotqty||'-')}ロット（1ロット ${r.lotprice?Number(r.lotprice).toLocaleString()+'円':'-'}）　${estAmount(r)}</span>
        ${r.vendor?`<b>発注先</b><span>${esc(r.vendor)}</span>`:''}
        ${r.url?`<b>URL</b><span><a href="${esc(r.url)}" target="_blank" rel="noopener">リンク</a></span>`:''}
        ${r.amount?`<b>発注金額</b><span>${Number(r.amount).toLocaleString()}円</span>`:''}
        ${r.orderdate?`<b>発注日/発注者</b><span>${esc(fmtDate(r.orderdate))} / ${esc(r.orderer||'-')}</span>`:''}
        ${r.note?`<b>備考</b><span>${esc(r.note)}</span>`:''}
      </div>
      ${act?`<div class="actions">${act}</div>`:''}
    </div>`;
  }).join('');
}

/* 到着済み：過去ログ＋検索＋コピー */
function renderArrived(){
  const box=document.getElementById('arrivedBox');
  const q=(document.getElementById('arrSearch').value||'').trim().toLowerCase();
  let list = rows.filter(r=> r.status==='到着済');
  if(q){
    list = list.filter(r=> [r.item,r.code,r.size,r.color,r.vendor,r.requester,r.orderer,r.receiver,r.note]
      .map(x=>String(x||'').toLowerCase()).join(' ').includes(q));
  }
  if(!list.length){ box.innerHTML='<div class="empty">'+(q?'該当する到着済みはありません。':'まだ到着済みの備品はありません。')+'</div>'; return; }
  box.innerHTML = list.map(r=>`
    <div class="card" style="background:#f3f5f4">
      <div class="row-head">${badge(r.status)}<div class="row-title">${esc(r.item)}</div><div style="margin-left:auto;font-size:12px;color:#7c8a83">到着 ${esc(fmtDate(r.arrival))}</div></div>
      <div class="kv">
        <b>依頼者</b><span>${esc(r.requester||'')}</span>
        <b>受取者</b><span style="font-weight:800;color:#15803D">${esc(r.receiver||'-')}</span>
        <b>品番/JAN</b><span>${esc(r.code||'-')}</span>
        <b>サイズ/カラー</b><span>${esc(r.size||'-')} / ${esc(r.color||'-')}</span>
        <b>ロット</b><span>${esc(r.lot||'-')}入 × ${esc(r.lotqty||'-')}ロット（1ロット ${r.lotprice?Number(r.lotprice).toLocaleString()+'円':'-'}）</span>
        ${r.vendor?`<b>発注先</b><span>${esc(r.vendor)}</span>`:''}
        ${r.amount?`<b>発注金額</b><span>${Number(r.amount).toLocaleString()}円</span>`:''}
        ${r.url?`<b>URL</b><span><a href="${esc(r.url)}" target="_blank" rel="noopener">リンク</a></span>`:''}
        ${r.note?`<b>備考</b><span>${esc(r.note)}</span>`:''}
      </div>
      <div class="actions"><button class="btn ghost" onclick="copyToForm('${esc(r.id)}')">この備品をコピーして再注文</button></div>
    </div>`).join('');
}

/* 到着済みから「コピーして再注文」→ 依頼フォームへ自動入力 */
function copyToForm(id){
  const r=rows.find(x=>String(x.id)===String(id)); if(!r) return;
  const set=(k,v)=>document.getElementById(k).value=(v==null?'':v);
  set('f_item',r.item); set('f_code',r.code); set('f_size',r.size); set('f_color',r.color);
  set('f_lot',r.lot); set('f_lotprice',r.lotprice); set('f_lotqty',r.lotqty);
  set('f_url',r.url); set('f_note',r.note);
  document.getElementById('f_reqdate').value=todayStr();
  showTab('req');
  window.scrollTo({top:0,behavior:'smooth'});
  toast('コピーしました。内容を確認して「この内容で依頼する」を押してください');
}

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(v){ if(!v) return ''; const s=String(v); if(s.indexOf('T')>=0){ const d=new Date(s); if(!isNaN(d)) return (d.getMonth()+1)+'/'+d.getDate(); } const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); return m ? (Number(m[2])+'/'+Number(m[3])) : s; }

function openOrder(id){
  const r=rows.find(x=>String(x.id)===String(id)); if(!r)return; editId=id;
  document.getElementById('m_vendor').value=r.vendor||'';
  document.getElementById('m_amount').value=r.amount||'';
  document.getElementById('m_orderdate').value=(r.orderdate&&/^\d{4}-\d{2}-\d{2}/.test(r.orderdate))?r.orderdate.slice(0,10):todayStr();
  document.getElementById('m_orderer').value=r.orderer||ME_NAME||'';
  document.getElementById('ov').classList.add('show');
}
function closeModal(){ document.getElementById('ov').classList.remove('show'); editId=null; }
async function saveOrder(){
  if(!editId) return;
  const btn=document.getElementById('m_save'); btn.disabled=true;
  await apiPost({
    action:'order', dest:dest, id:editId,
    vendor:document.getElementById('m_vendor').value.trim(),
    amount:document.getElementById('m_amount').value,
    orderdate:document.getElementById('m_orderdate').value,
    orderer:document.getElementById('m_orderer').value.trim()||ME_NAME
  });
  btn.disabled=false; closeModal(); toast('発注処理を保存しました'); await sleep(800); refresh();
}
async function receive(id){
  if(!confirm('この備品を「受け取った」として通知します。よろしいですか？\n（到着日が今日になり、受取担当者として あなたの名前 が記録されます。「到着済み」タブへ移動します）')) return;
  await apiPost({ action:'receive', dest:dest, id:id, receiver:ME_NAME||'（不明）', arrival:todayStr() });
  toast('受取通知しました！「到着済み」へ移動しました'); await sleep(800); refresh();
}

let tt; function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('show'),1900); }
document.getElementById('ov').addEventListener('click',e=>{ if(e.target.id==='ov') closeModal(); });
</script>
